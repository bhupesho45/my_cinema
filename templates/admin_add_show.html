<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Show</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: url('/static/images/abstract-halftone-bg.jpeg') no-repeat center center fixed;
            background-size: cover;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center font-sans">
    <div class="bg-white/80 border border-orange-200 shadow-lg p-10 rounded-2xl w-full max-w-lg relative backdrop-blur-md">
        <div class="absolute -top-8 left-1/2 -translate-x-1/2">
            <div class="bg-orange-500 rounded-full p-3 shadow-md">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M12 4v16m8-8H4"></path>
                </svg>
            </div>
        </div>
        <header class="flex flex-col items-center mb-8 mt-4">
            <h2 class="text-3xl font-extrabold text-[#222] tracking-wide mb-1">Add New Show</h2>
            <a href="{{ url_for('movies') }}" class="mt-2 text-orange-500 hover:text-teal-500 underline transition">← Back to Movies</a>
        </header>
        {% if msg %}
            <p class="text-center mb-4 text-teal-600 font-semibold bg-teal-100 rounded py-2">{{ msg }}</p>
        {% endif %}
        <form action="{{ url_for('admin_add_show') }}" method="post" class="space-y-6">
            <div>
                <label class="block text-orange-700 text-sm font-semibold mb-2" for="movie_id">Movie</label>
                <select class="w-full px-4 py-2 rounded-lg bg-orange-50 border border-orange-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 text-[#222] transition" id="movie_id" name="movie_id" required>
                    {% for movie in movies %}
                    <option value="{{ movie.id }}">{{ movie.title }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-orange-700 text-sm font-semibold mb-2" for="theater_id">Theater</label>
                <select class="w-full px-4 py-2 rounded-lg bg-orange-50 border border-orange-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 text-[#222] transition" id="theater_id" name="theater_id" required>
                    {% for theater in theaters %}
                    <option value="{{ theater.id }}">{{ theater.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-orange-700 text-sm font-semibold mb-2" for="showtime">Showtime</label>
                <input class="w-full px-4 py-2 rounded-lg bg-orange-50 border border-orange-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 text-[#222] transition" id="showtime" name="showtime" type="datetime-local" required>
            </div>
            <div>
                <label class="block text-orange-700 text-sm font-semibold mb-2" for="price">Price (₹)</label>
                <input class="w-full px-4 py-2 rounded-lg bg-orange-50 border border-orange-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 text-[#222] transition" id="price" name="price" type="number" step="0.01" min="0" required>
            </div>
            <div class="flex items-center justify-center">
                <button class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-8 rounded-full shadow-md focus:outline-none focus:ring-2 focus:ring-orange-200 transition text-lg" type="submit">
                    Add Show
                </button>
            </div>
        </form>
    </div>

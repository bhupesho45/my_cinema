<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyCinema - Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: url('/static/images/abstract-halftone-bg.jpeg') no-repeat center center fixed;
            background-size: cover;
        }
    </style>
</head>
<body class="bg-[#FFF4EC] min-h-screen flex items-center justify-center font-sans">
    <div class="bg-white/80 border border-orange-200 shadow-lg p-10 rounded-2xl w-full max-w-md backdrop-blur-md">
        <h2 class="text-3xl font-extrabold text-[#222] text-center mb-6 drop-shadow-lg">Payment Details</h2>
        
        {% if msg %}
            <p class="text-center mb-4 text-red-500">{{ msg }}</p>
        {% endif %}
        
        <div class="text-center mb-6">
            <p class="text-gray-700 text-lg">You are booking seats: <span class="font-bold text-orange-500">{{ seats | join(', ') }}</span></p>
            <p class="text-xl font-bold mt-2 text-orange-500">Total Amount: ₹{{ total_price }}</p>
        </div>
        
        <form action="{{ url_for('payment') }}" method="post" class="space-y-6">
            <div>
                <label class="block text-orange-700 text-sm font-semibold mb-2" for="card_name">Name on Card</label>
                <input class="w-full px-4 py-2 rounded-lg bg-orange-50 border border-orange-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 text-[#222] placeholder-orange-400 transition" id="card_name" name="card_name" type="text" placeholder="John Doe" required>
            </div>
            <div>
                <label class="block text-orange-700 text-sm font-semibold mb-2" for="card_number">Card Number</label>
                <input class="w-full px-4 py-2 rounded-lg bg-orange-50 border border-orange-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 text-[#222] placeholder-orange-400 transition" id="card_number" name="card_number" type="text" placeholder="**** **** **** ****" required>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-orange-700 text-sm font-semibold mb-2" for="expiry">Expiry Date</label>
                    <input class="w-full px-4 py-2 rounded-lg bg-orange-50 border border-orange-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 text-[#222] placeholder-orange-400 transition" id="expiry" name="expiry" type="text" placeholder="MM/YY" required>
                </div>
                <div>
                    <label class="block text-orange-700 text-sm font-semibold mb-2" for="cvv">CVV</label>
                    <input class="w-full px-4 py-2 rounded-lg bg-orange-50 border border-orange-200 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 text-[#222] placeholder-orange-400 transition" id="cvv" name="cvv" type="text" placeholder="***" required>
                </div>
            </div>
            <div class="flex items-center justify-center">
                <button class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-8 rounded-full shadow-md focus:outline-none focus:ring-2 focus:ring-orange-200 transition text-lg" type="submit">
                    Pay Now
                </button>
            </div>
